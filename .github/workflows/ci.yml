name: CI

on: push

env:
  BUILDER: ghcr.io/statecl/framework

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/statecl/framework:latest-builder-amd64-release
    steps:
      - uses: actions/checkout@v4

      - name: Build and run C++ tests
        run: |
          apk add --no-cache git
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DENABLE_TESTS=ON -DBoost_USE_STATIC_RUNTIME=ON
          cmake --build build -j2
          ctest --test-dir build --output-on-failure

  smoke:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/statecl/framework:latest-builder-amd64-release
    steps:
      - uses: actions/checkout@v4

      - name: Build app
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBoost_USE_STATIC_RUNTIME=ON
          cmake --build build -j2

      - name: Smoke test endpoint
        run: |
          ./build/app &
          sleep 3
          curl -sf http://localhost:8080/api/hello | grep -q 'State'
          echo "OK"
          kill %1 2>/dev/null || true
